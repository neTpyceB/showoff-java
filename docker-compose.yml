services:
  app:
    image: gradle:9.3.1-jdk21
    container_name: showoff-java-app
    working_dir: /workspace
    command: ["./gradlew", "--no-daemon", "runIncidentApi"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: incidentops
      POSTGRES_USER: incidentops
      POSTGRES_PASSWORD: incidentops
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      INCIDENTOPS_KAFKA_TOPIC: incident-events
      INCIDENTOPS_KAFKA_GROUP_ID: incidentops-docker
      INCIDENTOPS_API_KEY: compose-local-api-key
      INCIDENTOPS_SIGNING_SECRET: compose-local-signing-secret
      SERVER_PORT: 8080
    volumes:
      - ./:/workspace
      - gradle_cache:/home/gradle/.gradle
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    restart: unless-stopped
    networks:
      - incidentops_net

  postgres:
    image: postgres:17
    container_name: showoff-java-postgres
    environment:
      POSTGRES_DB: incidentops
      POSTGRES_USER: incidentops
      POSTGRES_PASSWORD: incidentops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incidentops -d incidentops"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - incidentops_net

  redis:
    image: redis:8-alpine
    container_name: showoff-java-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - incidentops_net

  rabbitmq:
    image: rabbitmq:4-management
    container_name: showoff-java-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    networks:
      - incidentops_net

  kafka:
    image: bitnami/kafka:3.9
    container_name: showoff-java-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
    restart: unless-stopped
    networks:
      - incidentops_net

volumes:
  postgres_data:
  gradle_cache:

networks:
  incidentops_net:
