spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.show-sql=false
spring.cache.type=redis
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}

incidentops.integrations.redis.host=${REDIS_HOST}
incidentops.integrations.rabbitmq.host=${RABBITMQ_HOST}
incidentops.security.api-key=${INCIDENTOPS_API_KEY}
incidentops.security.signing-secret=${INCIDENTOPS_SIGNING_SECRET}
incidentops.messaging.kafka.topic=${INCIDENTOPS_KAFKA_TOPIC}
incidentops.messaging.kafka.group-id=${INCIDENTOPS_KAFKA_GROUP_ID}
incidentops.async.executor.core-pool-size=${INCIDENTOPS_ASYNC_CORE_POOL_SIZE}
incidentops.async.executor.max-pool-size=${INCIDENTOPS_ASYNC_MAX_POOL_SIZE}
incidentops.async.executor.queue-capacity=${INCIDENTOPS_ASYNC_QUEUE_CAPACITY}
incidentops.async.executor.thread-name-prefix=${INCIDENTOPS_ASYNC_THREAD_NAME_PREFIX}
