spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.cache.type=${SPRING_CACHE_TYPE:none}
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.showoff.incidentops.springboot.messaging
spring.kafka.consumer.properties.spring.json.value.default.type=com.showoff.incidentops.springboot.messaging.dto.IncidentCreatedEvent
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.listener.missing-topics-fatal=false
server.port=${SERVER_PORT:8080}
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}

incidentops.tickets.default-status=${INCIDENTOPS_DEFAULT_STATUS:OPEN}
incidentops.tickets.max-page-size=${INCIDENTOPS_MAX_PAGE_SIZE:100}
incidentops.integrations.redis.host=${REDIS_HOST}
incidentops.integrations.redis.port=${REDIS_PORT:6379}
incidentops.integrations.rabbitmq.host=${RABBITMQ_HOST}
incidentops.integrations.rabbitmq.port=${RABBITMQ_PORT:5672}
incidentops.security.api-key=${INCIDENTOPS_API_KEY}
incidentops.security.signing-secret=${INCIDENTOPS_SIGNING_SECRET}
incidentops.messaging.kafka.topic=${INCIDENTOPS_KAFKA_TOPIC}
incidentops.messaging.kafka.group-id=${INCIDENTOPS_KAFKA_GROUP_ID}
incidentops.async.executor.core-pool-size=${INCIDENTOPS_ASYNC_CORE_POOL_SIZE:4}
incidentops.async.executor.max-pool-size=${INCIDENTOPS_ASYNC_MAX_POOL_SIZE:16}
incidentops.async.executor.queue-capacity=${INCIDENTOPS_ASYNC_QUEUE_CAPACITY:200}
incidentops.async.executor.thread-name-prefix=${INCIDENTOPS_ASYNC_THREAD_NAME_PREFIX:incidentops-async-}
