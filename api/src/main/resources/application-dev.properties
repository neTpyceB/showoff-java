spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:incidentops}
spring.datasource.username=${POSTGRES_USER:incidentops}
spring.datasource.password=${POSTGRES_PASSWORD:incidentops}
spring.jpa.show-sql=true
spring.cache.type=simple
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

incidentops.integrations.redis.host=${REDIS_HOST:localhost}
incidentops.integrations.rabbitmq.host=${RABBITMQ_HOST:localhost}
incidentops.security.api-key=${INCIDENTOPS_API_KEY:dev-local-api-key}
incidentops.security.signing-secret=${INCIDENTOPS_SIGNING_SECRET:dev-local-signing-secret}
incidentops.messaging.kafka.topic=${INCIDENTOPS_KAFKA_TOPIC:incident-events}
incidentops.messaging.kafka.group-id=${INCIDENTOPS_KAFKA_GROUP_ID:incidentops-dev}
incidentops.async.executor.core-pool-size=${INCIDENTOPS_ASYNC_CORE_POOL_SIZE:2}
incidentops.async.executor.max-pool-size=${INCIDENTOPS_ASYNC_MAX_POOL_SIZE:8}
incidentops.async.executor.queue-capacity=${INCIDENTOPS_ASYNC_QUEUE_CAPACITY:100}
incidentops.async.executor.thread-name-prefix=${INCIDENTOPS_ASYNC_THREAD_NAME_PREFIX:incidentops-dev-async-}
